name: Build Plugin

on:
  push:
    branches: main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VCPKG_BINARY_SOURCES: ${{ vars.AZ_BLOB_VCPKG_URL != '' && format('clear;x-azblob,{0},{1},readwrite', vars.AZ_BLOB_VCPKG_URL, secrets.AZ_BLOB_SAS) || '' }}

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 2GB
          maximum-size: 48GB

      - name: Set VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Build
        id: build
        uses: ModOrganizer2/build-with-mob-action@master
        with:
          mo2-dependencies: cmake_common uibase bsatk lootcli
          qt-modules: qtpositioning qtwebchannel qtwebengine

      - name: Install
        run: cmake --install vsbuild --config RelWithDebInfo
        working-directory: ${{ steps.build.outputs.working-directory }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bsplugins
          path: ${{ steps.build.outputs.cmake-install-path }}/bin
